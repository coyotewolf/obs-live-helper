<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Speaking Avatar Overlay</title>
  <link rel="stylesheet" href="../css/pages/dcprofilepic.css" />
  <link rel="stylesheet" href="../css/pages/overlay-theme.css" />
</head>
<body>
  <main class="discord-overlay-shell" aria-label="Discord speaking avatars overlay">
    <div id="loadingText" class="loading-text">正在載入語音頭貼...</div>
    <iframe
      id="discordStreamkitFrame"
      class="discord-frame"
      title="Discord StreamKit Voice Overlay"
      allowtransparency="true"
      scrolling="no"
      referrerpolicy="no-referrer"
    ></iframe>
  </main>
  <script src="../js/theme-sync.js"></script>
  <script src="../js/dcprofilepic.js"></script>
</body>
</html>
