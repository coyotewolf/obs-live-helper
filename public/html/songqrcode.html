<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Request QR Code</title>
  <link rel="stylesheet" href="../css/pages/songqrcode.css">
</head>
<body>
  <main class="qr-overlay" id="qrOverlay">
    <section class="qr-card" id="qrCard">
      <div class="qr-title" id="qrTitle">掃碼點歌</div>
      <div class="qr-box">
        <img id="qrImage" alt="Song request QR Code">

      <div class="qr-hint" id="qrHint">正在產生 QR Code...</div>
      <div class="qr-pin" id="qrPin">PIN ------</div>
    </section>
  </main>
  <script src="../js/songqrcode.js"></script>
</body>
</html>
